<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="login-box">

    <h1>Login</h1>

    <input
        id="token"
        type="text"
        placeholder="Enter Token">

    <button onclick="login()">
        Continue
    </button>

</div>

<script>

function login(){

    const token =
        document.getElementById("token").value;

    localStorage.setItem(
        "token",
        token
    );

    window.location =
        "dashboard.html";

}

</script>

</body>
</html>
