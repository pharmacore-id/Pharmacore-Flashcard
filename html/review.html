<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Review</title>

<script src="js/config.js"></script>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#F8F9FC;
    font-family:Inter,sans-serif;
}

.container{
    width:900px;
}

.topic{
    text-align:center;
    color:#7C5CFC;
    font-weight:600;
    margin-bottom:10px;
}

.progress{
    text-align:center;
    margin-bottom:20px;
    color:#666;
}

.card{
    background:white;
    border-radius:30px;
    padding:60px;
    box-shadow:0 8px 30px rgba(0,0,0,.08);
}

.question{
    font-size:34px;
    font-weight:700;
    line-height:1.4;
}

.answer{
    margin-top:30px;
    padding-top:30px;
    border-top:1px solid #eee;
    display:none;
}

.show-btn{
    width:100%;
    margin-top:30px;
    padding:18px;
    border:none;
    border-radius:16px;
    background:#7C5CFC;
    color:white;
    font-size:18px;
}

.rating{
    display:none;
    margin-top:30px;
    gap:10px;
}

.rate{
    flex:1;
    padding:16px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-size:18px;
}

.r1{background:#FFE5E5;}
.r2{background:#FFF1D6;}
.r3{background:#FFF8D5;}
.r4{background:#E4F7E8;}
.r5{background:#D8F5DE;}

.loading{
    text-align:center;
}

</style>

</head>

<body>

<div class="container">

    <div class="topic" id="topic"></div>

    <div class="progress" id="progress">
        Loading...
    </div>

    <div class="card">

        <div
            class="question"
            id="question">
        </div>

        <button
            class="show-btn"
            onclick="showAnswer()">
            Show Answer
        </button>

        <div
            class="answer"
            id="answer">

            <h3>Answer</h3>

            <p id="answerText"></p>

        </div>

        <div
            class="rating"
            id="rating">

            <button
              class="rate r1"
              onclick="submitRating(1)">
              1
            </button>

            <button
              class="rate r2"
              onclick="submitRating(2)">
              2
            </button>

            <button
              class="rate r3"
              onclick="submitRating(3)">
              3
            </button>

            <button
              class="rate r4"
              onclick="submitRating(4)">
              4
            </button>

            <button
              class="rate r5"
              onclick="submitRating(5)">
              5
            </button>

        </div>

    </div>

</div>

<script>

let cards = [];
let current = 0;

async function loadCards(){

    const token =
        localStorage.getItem("token");

    const mainTopic =
        localStorage.getItem("mainTopic");

    const subTopic =
        localStorage.getItem("subTopic");

    document
      .getElementById("topic")
      .innerText =
      mainTopic + " • " + subTopic;

    const res =
        await fetch(
            API_URL +
            "?action=getCards" +
            "&token=" + token +
            "&mainTopic=" +
            encodeURIComponent(mainTopic) +
            "&subTopic=" +
            encodeURIComponent(subTopic)
        );

    const data =
        await res.json();

    cards = data.cards;

    showCard();

}

function showCard(){

    if(current >= cards.length){

        document.body.innerHTML = `

        <div style="
            text-align:center;
            font-family:Inter,sans-serif;
        ">

            <h1>
                Session Complete 🎉
            </h1>

            <button
                onclick="
                location.href='dashboard.html'
                ">
                Back Dashboard
            </button>

        </div>

        `;

        return;

    }

    let card =
        cards[current];

    document
        .getElementById("question")
        .innerText =
        card.front;

    document
        .getElementById("answerText")
        .innerText =
        card.back;

    document
        .getElementById("progress")
        .innerText =
        (current+1)
        + " / "
        + cards.length;

    document
        .getElementById("answer")
        .style.display =
        "none";

    document
        .getElementById("rating")
        .style.display =
        "none";

    document
        .querySelector(".show-btn")
        .style.display =
        "block";

}

function showAnswer(){

    document
        .getElementById("answer")
        .style.display =
        "block";

    document
        .getElementById("rating")
        .style.display =
        "flex";

    document
        .querySelector(".show-btn")
        .style.display =
        "none";

}

async function submitRating(rating){

    const token =
        localStorage.getItem("token");

    const card =
        cards[current];

    await fetch(API_URL,{

        method:"POST",

        body:JSON.stringify({

            action:"submitReview",

            token:token,

            cardId:card.id,

            rating:rating

        })

    });

    current++;

    showCard();

}

loadCards();

</script>

</body>
</html>
